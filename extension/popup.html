<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 300px;
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: #0a0a0a;
        color: #fafafa;
        padding: 18px;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 6px;
        font-family: "JetBrains Mono", monospace;
        letter-spacing: -0.02em;
      }
      p {
        font-size: 12px;
        color: #a1a1aa;
        margin: 0 0 16px;
        line-height: 1.55;
      }
      button {
        width: 100%;
        padding: 11px;
        border: 0;
        border-radius: 7px;
        background: #fafafa;
        color: #0a0a0a;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover { background: #e4e4e7; }
      button:disabled { opacity: 0.5; cursor: default; }
      #status { font-size: 11px; color: #a1a1aa; margin-top: 12px; min-height: 14px; }
      .b { color: #007aff; }
      .dot { display:inline-block;width:6px;height:6px;border-radius:50%;background:#007aff;margin-right:6px;vertical-align:middle; }
    </style>
  </head>
  <body>
    <h1><span class="dot"></span>AI <span class="b">Memory</span></h1>
    <p>Capture this AI conversation and open it in AI Memory to build a portable memory package.</p>
    <button id="capture">Capture &amp; open AI Memory</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
